
services:
  frontend:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000/api}
    networks:
      - ai-platform-network

  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/ai_platform}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - QUEUE_NAME=${QUEUE_NAME:-task_queue}
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - ai-platform-network

  worker:
    build: ./worker
    depends_on:
      - mongo
      - redis
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/ai_platform}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - QUEUE_NAME=${QUEUE_NAME:-task_queue}
      - WORKER_TIMEOUT=${WORKER_TIMEOUT:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - ai-platform-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ai-platform-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-platform-network

networks:
  ai-platform-network:
    driver: bridge

volumes:
  mongo_data:
